<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesanan Saya - Arluxe</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<body>
  

</button>

  <div class="pesanan-container">
    <h2>Pesanan Saya</h2>

    <div id="pesananKosong" class="pesanan-box" style="display: none;">
      <p>Belum ada pesanan.</p>
    </div>

    <div id="pesananContent" style="display: none;">
      <div class="pesanan-box">
        <h3>Informasi Penerima</h3>
        <p id="pesananNama"></p>
        <p id="pesananNoHp"></p>
        <p id="pesananAlamat"></p>
      </div>

      <div class="pesanan-box">
        <h3>Pengiriman & Pembayaran</h3>
        <p id="pesananPengiriman"></p>
        <p id="pesananPembayaran"></p>
        <p id="pesananStatus"></p>
      </div>

      <div class="pesanan-box">
        <h3>Status Pesanan</h3>
        <div class="status-tracker">
          <div class="status-step" id="stepDikemas">
            <div class="step-circle"></div>
            <span>Sedang Dikemas</span>
          </div>

          <div class="status-step" id="stepDiantar">
            <div class="step-circle"></div>
            <span>Sedang Diantar</span>
          </div>

          <div class="status-step" id="stepTiba">
            <div class="step-circle"></div>
            <span>Pesanan Tiba</span>
          </div>
        </div>
      </div>

      <div class="pesanan-box">
        <h3>Produk</h3>
        <div id="pesananItems"></div>
      </div>

      <div class="pesanan-box">
        <h3>Ringkasan Pembayaran</h3>
        <p id="pesananSubtotal"></p>
        <p id="pesananOngkir"></p>
        <h3 id="pesananTotal"></h3>
      </div>
    </div>
  </div>

    </a>
  </nav>

</body>
</html>
