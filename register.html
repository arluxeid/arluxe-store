<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Arluxe</title>

  <!-- CSS DI SINI -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">

  <div class="phone">
    <div class="auth-screen">

      <h1 class="logo">Arluxe</h1>
      <p class="tagline">DRIVEN BY ELEGANCE</p>

      <div class="auth-content">

        <div class="input-group">
          <input type="text" id="name" placeholder="Enter your name">
        </div>

        <div class="input-group">
          <input type="email" id="reg-email" placeholder="Enter your email">
        </div>

        <div class="input-group">
          <input type="password" id="reg-password" placeholder="Create your password">
        </div>

        <button class="main-btn" onclick="registerUser()">Sign Up</button>

        <p class="switch-text">
          Already have an account?
          <a href="index.html">Login</a>
        </p>

        <p id="register-msg"></p>

      </div>

    </div>
  </div>

  <!-- JS DI PALING BAWAH -->
  <script src="script.js"></script>

</body>
</html>
